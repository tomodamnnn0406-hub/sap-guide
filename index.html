<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>SAP Exam – Interactive Study Guide</title>
<style>
:root{--blue:#1F4E79;--blue2:#2c6ca8;--bg:#f4f6f9;--card:#fff;--line:#e2e8f0;--grey:#5a5a5a;--green:#1e7b34;--greenbg:#e8f5ec;--amber:#9a6700;--amberbg:#fff6d9;--red:#b42318;--redbg:#fde7e7;}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:#1c2733;line-height:1.5}
.wrap{max-width:860px;margin:0 auto;padding:18px 16px 80px}
header h1{color:var(--blue);font-size:26px;margin:6px 0 2px}
header .sub{color:var(--grey);font-size:13px;margin-bottom:14px}
.bar{position:sticky;top:0;z-index:5;background:var(--bg);padding:10px 0;border-bottom:1px solid var(--line);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.bar input[type=search]{flex:1;min-width:140px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:14px}
.numwrap{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--grey);font-weight:600}
#num{width:56px;padding:7px 8px;border:2px solid var(--blue2);border-radius:8px;font-size:15px;font-weight:700;color:var(--blue);text-align:center}
.btn{border:1px solid var(--line);background:#fff;color:var(--blue);padding:7px 11px;border-radius:8px;font-size:13px;cursor:pointer}
.btn:hover{background:#eef3fa}
.overall{font-size:13px;color:var(--grey);margin:6px 2px 14px}
.overall b{color:var(--blue)}
.obar{height:8px;background:#e6ecf3;border-radius:6px;overflow:hidden;margin-top:5px}
.obar i{display:block;height:100%;width:0;background:var(--green);transition:width .25s}
details.card{background:var(--card);border:1px solid var(--line);border-radius:12px;margin:10px 0;overflow:hidden;box-shadow:0 1px 2px rgba(20,40,70,.04)}
details.card>summary{list-style:none;cursor:pointer;padding:13px 15px;display:flex;align-items:center;gap:10px;font-weight:600}
details.card>summary::-webkit-details-marker{display:none}
.ref>summary{color:var(--blue)}
.task>summary{border-left:5px solid var(--blue2)}
.task.done>summary{border-left-color:var(--green);background:var(--greenbg)}
.tnum{font-size:11px;font-weight:700;letter-spacing:.5px;color:#fff;background:var(--blue2);padding:2px 7px;border-radius:20px;white-space:nowrap}
.task.done .tnum{background:var(--green)}
.ttitle{flex:1;font-size:15px}
.badge{font-size:12px;font-weight:700;color:var(--grey);background:#eef1f5;padding:2px 9px;border-radius:20px;white-space:nowrap}
.task.done .badge{color:#fff;background:var(--green)}
.chev{color:#9fb0c3;font-size:12px;transition:transform .2s}
details[open]>summary .chev{transform:rotate(90deg)}
.body{padding:4px 16px 16px}
.goal{font-size:13px;color:var(--grey);font-style:italic;margin:6px 0}
.open{font-size:13px;margin:4px 0 2px}
.open b{color:var(--blue)}
.enter{background:#eef3fa;border:1px solid #cbd7e8;border-left:5px solid var(--blue);border-radius:8px;padding:8px 11px;margin:10px 0;font-size:13px}
.enter b{color:var(--blue);font-size:11px;letter-spacing:.5px}
.enter .v{color:#23303f}
.steplabel{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--grey);margin:14px 0 4px}
ul.steps{list-style:none;margin:0;padding:0}
ul.steps>li{margin:2px 0}
ul.subs{list-style:none;margin:1px 0 8px 38px;padding:0}
.subdetail{color:#56657a;font-size:13px;padding:3px 0;line-height:1.45}
.subdetail::before{content:"– ";color:#9fb0c3}
label.step{display:flex;gap:9px;align-items:flex-start;padding:7px 9px;border-radius:8px;cursor:pointer}
label.step:hover{background:#f7f9fc}
label.step input{margin-top:3px;width:17px;height:17px;flex:none;cursor:pointer;accent-color:var(--green)}
label.step.checked .txt{color:#8a98a6;text-decoration:line-through}
.txt b{color:#16212e}
.note{border-radius:8px;padding:8px 11px;margin:8px 0;font-size:13px;border-left:5px solid}
.tip{background:var(--amberbg);border-color:var(--amber);color:#5c4600}
.tip b{color:var(--amber)}
.proof{background:var(--greenbg);border-color:var(--green);color:#14532a}
.proof b{color:var(--green)}
table.ref{width:100%;border-collapse:collapse;font-size:13px;margin:6px 0}
table.ref td{border:1px solid var(--line);padding:6px 9px;vertical-align:top}
table.ref td:first-child{font-weight:600;color:var(--blue);width:38%;background:#f6f9fc}
.refbody{padding:4px 16px 16px}
.refbody h3{color:var(--blue);font-size:14px;margin:14px 0 4px}
.refbody ul{margin:4px 0;padding-left:20px;font-size:13px}
.refbody li{margin:3px 0}
.hide{display:none!important}
footer{color:#9aa7b5;font-size:12px;text-align:center;margin-top:24px}
</style></head>
<body><div class="wrap">
<header><h1>SAP Practical Exam – Interactive Study Guide</h1>
<div class="sub">GBI on SAP Fiori · your number = <b id="subnum">391</b> · tap a task to open it, tick each step as you go</div></header>
<div class="bar">
 <label class="numwrap">Your no. <input id="num" inputmode="numeric" maxlength="3" value="391"></label>
 <input type="search" id="q" placeholder="Filter tasks…">
 <button class="btn" id="expand">Expand all</button>
 <button class="btn" id="collapse">Collapse all</button>
 <button class="btn" id="reset">Reset progress</button>
</div>
<div class="overall" id="overall"></div>
<div id="ref"></div>
<div id="tasks"></div>
<footer>Progress is saved on this device. · Tick steps, watch the task turn green.</footer>
</div>
<script>
var DATA = {"tasks":[{"n":1,"title":"Create an offer (Sales Quotation) for Philly Bikes","goal":"An “offer” = a Sales Quotation. The give-away is the probability field.","app":"Sales and Distribution → “Manage Sales Quotations” → “Create Quotation” (VA21).","steps":[{"b":"Open the app.","t":"","sub":["Top-right of the SAP launchpad, click the magnifier (search) icon.","Type “Create Quotation” and press Enter.","Click the “Create Quotation” tile that appears in the results."]},{"b":"Fill the small “Create Quotation” entry box.","t":"","sub":["Click the “Quotation Type” field → type QT.","Click “Sales Organization” → type UE00.","Click “Distribution Channel” → type WH.","Click “Division” → type BI.","Click the “Continue” button (green ✓) at the bottom of the box."]},{"b":"Set Sold-To Party = Philly Bikes.","t":"","sub":["At the top-left, click the “Sold-To Party” field, then click the small search icon at its right end (F4).","In the popup: click “Name”, type Philly* , click “Go”.","Then click “Search term”, type 391 , click “Go” → one row (127391) appears.","Double-click that row (or select it and click OK)."]},{"b":"Enter the PO number.","t":"","sub":["Click the “Cust. Reference” field → type PB-391.","Click “Cust. Ref. Date” → type today’s date (or click the calendar icon and pick today)."]},{"b":"Set the delivery date (today + 14).","t":" In the lower Sales tab, click “Req. Deliv. Date”, press Cmd+A then Delete to clear it, type the date 14 days from today, press Enter."},{"b":"Add the material.","t":"","sub":["In the items table at the bottom, click the first empty cell under the “Material” column → type PRTR3391 → press Tab.","Click the cell under “Order Quantity” in that same row → type 2 → press Enter (a description and a net value appear)."]},{"b":"Add the 10% discount.","t":"","sub":["Double-click anywhere on the item row → the Item Details screen opens.","Click the “Conditions” tab.","Click the first empty row: under “CnTy” type RA00, under “Amount” type 10 → press Enter (the net drops 10%, e.g. 6,400 → 5,760).","Click the green Back arrow (top-left) to return to the overview."]},{"b":"Set the probability to 50%.","t":"","sub":["Double-click the item row again → Item Details.","Click the “Sales A” tab.","Find “Order Probability” (it shows 70) → click it → change it to 50.","Click the green Back arrow to return."]},{"b":"Save.","t":"","sub":["Bottom-right, click the “Save” button.","If a “Document Incomplete” popup appears, click “Save” / “Yes” to keep it.","Read the quotation number at the very bottom of the screen and write it down."]}],"notes":["If the delivery date didn’t copy into the item, double-click the item → Sales A → set “First Delivery Date” to today+14."],"proof":"The quotation number, Conditions showing RA00 = 10%, and Sales A → Order Probability = 50."},{"n":2,"title":"Create a contact person “Maryl Streep” for customer Philly Bikes","goal":"Attach a new person to the Philly Bikes company record.","app":"“Manage Business Partner Master Data”.","steps":[{"b":"Open the app.","t":"","sub":["Click the magnifier (search) icon top-right → type “Manage Business Partner Master Data” → Enter.","Click the “Manage Business Partner Master Data” tile."]},{"b":"Find Philly Bikes.","t":"","sub":["In the filter bar, click the “Business Partner” field → type 127391.","Click the “Go” button (right side of the filter bar).","Click the “Philly Bikes 127391” row in the results to open it."]},{"b":"Switch to edit mode.","t":" Top-right, click the “Edit” button."},{"b":"Open the Contacts tab.","t":" In the row of tabs (Basic Data, Roles, Address, …), click “Contacts”."},{"b":"Add the person.","t":"","sub":["Click the “Create” button in the Contacts area → an empty row/form appears.","Click “Last Name” → type Streep.","Click “First Name” → type Maryl. (Valid From defaults to today.)"]},{"b":"Save.","t":" Bottom-right, click “Save”. Wait for “Master data record saved”."}],"notes":["You CANNOT see the link from the contact’s own page – check it from the company: Philly Bikes → Contacts tab."],"proof":"Philly Bikes (127391) → Contacts tab listing Maryl Streep."},{"n":3,"title":"Create a contact person “Nicolas Cage” for vendor Spy Gear","goal":"Same as Task 2 but on a vendor.","app":"“Manage Business Partner Master Data”.","steps":[{"b":"Open the app.","t":" Search “Manage Business Partner Master Data” → click the tile."},{"b":"Find Spy Gear.","t":"","sub":["Click the “Business Partner” field → type 107391 → click “Go”.","Click the “Spy Gear 107391” row to open it."]},{"b":"Edit → Contacts → Create.","t":"","sub":["Top-right, click “Edit”.","Click the “Contacts” tab.","Click “Create”."]},{"b":"Enter the name and save.","t":"","sub":["“Last Name” → type Cage; “First Name” → type Nicolas.","Click “Save”."]}],"proof":"Spy Gear (107391) → Contacts tab listing Nicolas Cage."},{"n":4,"title":"Show a vendor’s balance and monthly payments","goal":"Read the balance and find payments in a chosen month.","app":"Financial Accounting → “Display Supplier Balances” (FK10N).","steps":[{"b":"Open the app.","t":" Search “Display Supplier Balances” → click the tile (not the “Deprecated” one)."},{"b":"Enter the keys and run it.","t":"","sub":["Click the “Supplier” field → type 107391 (Spy Gear).","Click “Company Code” → type US00.","Click “Fiscal Year” → type the year (try 2025 if the current year is empty).","Click the “Go” button."]},{"b":"Read the table – the “Period” column is the month.","t":"","sub":["Period 1 = January, 2 = February … 6 = June … 12 = December (13–16 are special year-end periods).","Debit column = payments you made to the vendor.","Credit column = new invoices / purchases.","Cumulative Balance = running total; the bottom Total row is the overall balance."]},{"b":"Find a month’s payment.","t":" Go to that month’s Period row and read the figure in the “Debit” column (e.g. Period 6 = June)."},{"b":"Prove it’s a payment.","t":" Double-click that Debit figure → the line-item view opens showing the payment document (document type KZ, with date and number)."}],"notes":["Quick rule: month → Period number; payments → Debit column; double-click the Debit to open the document."],"proof":"The balance table with the Period and its Debit, plus the payment document you reach by double-clicking it."},{"n":5,"title":"Define a BOM for the 3-wheeled Trolley (TROLLEY391)","goal":"List the components that make up the Trolley.","app":"“Create Material” (MM01), then “Maintain Bill of Material” (CS01).","intro":"In our class the Trolley and its two parts did NOT exist yet, so we create all three materials first, then build the BOM.","steps":[{"b":"PART 1 – Create the Trolley material.","t":"","sub":["Search “Create Material” → click the tile.","Click “Material” → TROLLEY391; “Industry sector” → M; “Material Type” → FERT → click Continue."]},{"b":"Pick the views and the plant.","t":"","sub":["In the Select Views popup, tick “Basic Data 1” + “Work Scheduling” → click the green ✓.","In the Organizational Levels popup, click “Plant” → DL00 → click the green ✓."]},{"b":"Fill Basic Data 1 and save.","t":"","sub":["“Description” → “3-Wheeled Trolley 391”; “Base Unit of Measure” → EA → Enter.","Click “Save” → “Material TROLLEY391 created”."]},{"b":"PART 2 – Create part PTRM391 (Plywood Platform).","t":"","sub":["Material PTRM391, Industry sector M, Material Type HALB → Continue → tick Basic Data 1 + Work Scheduling → ✓ → Plant DL00 → ✓.","Description “Plywood Platform 391”, Base Unit EA → Enter → Save."]},{"b":"PART 3 – Create part WHA391 (Wheel Housing Assy).","t":"","sub":["Material WHA391, M, HALB → Continue → views → Plant DL00 → ✓.","Description “Wheel Housing Assy 391”, Base Unit EA → Enter → Save → click “Exit”."]},{"b":"Open Maintain BOM and fill the Create BOM dialog.","t":"","sub":["Search “Maintain Bill of Material” → click the tile.","Click “Material” → TROLLEY391; “Plant” → DL00; “BOM Usage” → 1 → click OK."]},{"b":"Add the two components.","t":"","sub":["Row 0010: Component PTRM391, Quantity 1, Unit EA → Enter.","Row 0020: Component WHA391, Quantity 3, Unit EA → Enter."]},{"b":"Save the BOM.","t":" Click “Create” (bottom-right) → message “Material BOM saved”."}],"notes":["Finished Trolley = FERT; the two parts = HALB. Two green-check buttons each time (after views, after plant).","In the Create BOM dialog the fields can shift up a row – check Material/Plant/Usage before OK."],"proof":"Display BOM (CS03): TROLLEY391, DL00, Usage 1 → shows PTRM391 (1) and WHA391 (3)."},{"n":6,"title":"Show material inventory for EPADS (Elbow Pads)","goal":"Show stock by type AND future requirements.","app":"“Stock – Single Material” (MMBE) and “Monitor Stock / Requirements List” (MD04).","steps":[{"b":"Stock types (MMBE).","t":"","sub":["Search “Stock Single Material” → click the tile.","Click the “Material” field → type EPAD1391 → press Enter.","Read the columns per plant/storage location: Unrestricted-Use, Quality Inspection, Blocked, In Transit, etc."]},{"b":"Future requirements (MD04).","t":"","sub":["Search “Monitor Stock Requirements List” → click the tile.","On the initial screen click “Material” → type EPAD1391; click “Plant” → the plant it’s stocked in.","Click “Continue” → read the list of MRP elements (planned orders, deliveries, requirements) with a running available quantity."]}],"notes":["“EPADS” = Elbow Pads = EPAD1391, not EPAD391. Add the “1”, or F4 → description “Elbow Pads*”."],"proof":"One MMBE screenshot (stock types) + one MD04 screenshot (future requirements)."},{"n":7,"title":"Road Helmets PO + goods receipt + transfer into an empty bin","goal":"Full warehouse putaway: buy → receive → move into a bin, showing bins before & after.","app":"Warehouse Management space – Manage POs, Post Goods Receipt, Run Bin Status Report, Display Transfer Requirement, Confirm Transfer Order.","steps":[{"b":"Create the PO.","t":"","sub":["Search “Manage Purchase Orders” → click the tile → click “Create”.","Header: click “Supplier” → 107391 (Spy Gear); “Purchasing Org” → US00; “Purchasing Group” → N00; “Company Code” → US00.","Items tab → click the first “Material” cell → F4 → search “Road Helmet*” → pick RHMT1391; “Plant” → SD00; “Order Quantity” → 100; “Net Price” → 27.","Click the item to open its details → “Delivery” → “Storage Location” → TG00; “Schedule lines” → “Delivery Date” → today+10.","Click “Save” → write down the PO number."]},{"b":"Goods receipt.","t":"","sub":["Search/open “Post Goods Receipt for Purchasing Document”.","Click the “Purchasing Document” field → type your PO (F4: *391 to find it).","Click the helmet line → check Storage Location = Trading Goods, stock type Unrestricted-Use; tick “Item OK” / “delivery completed”.","Click “Post” → note the material document number."]},{"b":"Bins BEFORE (screenshot).","t":"","sub":["Open “Run Bin Status Report”.","Click “Warehouse Number” → 100; click “Storage Bin” → STBN*391 → click “Execute”.","The helmets are NOT in a STBN bin yet (temporary GR bin). Screenshot this."]},{"b":"Create the transfer order (putaway).","t":"","sub":["Open “Display Transfer Requirement – List for Material”.","Click “Warehouse Number” → 100; “Material” → RHMT1391; “Plant” → SD00 → press Enter.","Select your line (tick the box) → click “Create Transfer Order”.","On the putaway screen press Enter to copy quantity 100 down. Click “Sec” → 001; “Destination Storage Bin” → STBN-3-391; “Type” → 001 (F4 = Shelf Storage). Press Enter.","Click “Save” → write down the transfer-order number (press Enter past any warning)."]},{"b":"Confirm the transfer order.","t":"","sub":["Open “Confirm Transfer Order”. Click “Transfer Order” → the TO number; “Warehouse Number” → 100 → press Enter.","Review the qty/bin → click “Confirm”."]},{"b":"Bins AFTER (screenshot).","t":" Open “Run Bin Status Report” again (Warehouse 100, bin STBN*391, Execute) → STBN-3-391 now holds the 100 helmets. Screenshot."}],"notes":["The exam prints “IS00” – use US00. The empty bin can be any STBN-x-391 not in use."],"proof":"Two Bin Status Report screenshots (before = empty, after = STBN-3-391 holds 100)."},{"n":8,"title":"Sales Order for KNEE PADS + delivery + picking","goal":"Sell 10 knee pads to Philly Bikes and carry it through to picking.","app":"Create Sales Order (classic GUI) + “Create Outbound Deliveries – From Sales Orders”.","steps":[{"b":"Open Create Sales Order.","t":" Search “Create Sales Order” → click the “Create Sales Orders” tile (use the classic GUI screen – the newer one isn’t authorised for you)."},{"b":"Entry box.","t":"","sub":["“Order Type” → OR; “Sales Organization” → UE00; “Distribution Channel” → WH; “Division” → BI.","Click “Continue”."]},{"b":"Order data.","t":"","sub":["Click “Sold-To Party” → type 127391 (Philly Bikes) → Enter.","Items table: click the first “Material” cell → KPAD1391; “Order Quantity” → 10 → Enter.","Click “Req. Deliv. Date” → today+10.","Click “Save” → note the sales-order number."]},{"b":"Create the outbound delivery.","t":"","sub":["Open “Create Outbound Deliveries – From Sales Orders”.","Click “Shipping Point” → MI00; “Sales Document” → your order number; click “Go”.","Tick the row → click “Create Deliveries” → click “Display Log” to read the delivery number."]},{"b":"Pick the delivery.","t":"","sub":["Open the delivery (in the log click the delivery number → “Change Outbound Delivery”).","Click the “Picking” tab → click the item’s “SLoc” cell → FG00; click “Picked Qty” → 10 → Enter.","Click “Save”. (If the task says ship: click “Post Goods Issue”.)"]},{"b":"Stock & value.","t":" Open “Stock – Single Material” for KPAD1391 to read quantity and value."}],"notes":["If your knee pads are in San Diego, picking uses a transfer order instead (see Task 7)."],"proof":"The delivery with picking done + MMBE stock for KPAD1391."},{"n":9,"title":"Name and balance of G/L account 720300","goal":"Find the account’s name and balance.","app":"“Manage G/L Account Master Data” + “Display G/L Account Balances” (FAGLB03).","steps":[{"b":"Find the name.","t":"","sub":["Search “Manage G/L Account Master Data” → click the tile.","Click the search/filter field → type 720300 → Go → open it → read the description."]},{"b":"Find the balance.","t":"","sub":["Search “Display G/L Account Balances” → click the tile.","Click “G/L Account” → 720300; “Company Code” → US00; “Ledger” → 0L; “Fiscal Year” → the year.","Click “Go” → read the total."]}],"notes":["720300 may not exist in this client – read the exact name/figure off the screen. Learn the path, not a number."],"proof":"The account name and the balance figure."},{"n":10,"title":"Balance of the Philly Bikes customer and the Spy Gear vendor","goal":"Two quick balance look-ups.","app":"“Display Customer Balances” (FD10N) + “Display Supplier Balances” (FK10N).","steps":[{"b":"Customer balance.","t":"","sub":["Search “Display Customer Balances” → click the tile (not “Deprecated”).","Click “Customer” → 127391; “Company Code” → US00; “Fiscal Year” → 2025 (where the data is) → click “Go”.","Read the Total row (live result: 2,500 USD)."]},{"b":"Vendor balance.","t":"","sub":["Search “Display Supplier Balances” → click the tile.","Click “Supplier” → 107391; “Company Code” → US00; “Fiscal Year” → year → click “Go”.","Read the balance (live result: no postings = 0)."]}],"proof":"Both balance figures (one screenshot each)."},{"n":11,"title":"Invoice receipt for supply expense 500 USD (no PO) + payment","goal":"Book a vendor invoice NOT linked to a PO, then pay it.","app":"“Create Incoming Invoices” (FB60) → “Post Outgoing Payments” (F-53).","steps":[{"b":"Open Create Incoming Invoices.","t":" Search “Create Incoming Invoices” → click the tile."},{"b":"Header of the invoice.","t":"","sub":["Click the “Supplier” field’s search icon (F4) → Search term 391, Name Grand* → Go → pick “Rapids Nuts n Bolts” 108391.","Click “Invoice date” → today; “Reference” → SUPPLY391; “Amount” → 500 (currency USD).","Click in the “Text” field → type Supply expense."]},{"b":"Add the expense line.","t":"","sub":["In the items table, click the first “G/L acct” cell → F4 → switch the search to “description” → type *suppl* → pick 6850000 “Other operating supplies”.","Click “Amount in doc.curr.” → type 500 (D/C stays Debit)."]},{"b":"Complete the line (cost object + tax).","t":"","sub":["Double-click the line → on the detail screen click “Cost Center” → F4 → NA* → pick NAAD1000.","Click “Tax Code” → I0; click “Tax Jur.” → the valid jurisdiction code from your handout.","Go back; check the balance “Bal.” = 0.00 (green)."]},{"b":"Post the invoice.","t":" Bottom-right, click “Post” → note the document number."},{"b":"Pay it (F-53).","t":"","sub":["Open “Post Outgoing Payments”. Click “Document Date” → today; choose the bank account; “Amount” → 500.","Select the open Grand Rapids item → click “Post”."]},{"b":"Show the vendor balance.","t":" Open “Display Supplier Balances” for 108391 → screenshot."}],"notes":["In this client the US tax-jurisdiction config can block the final post; if so, your handout’s exact jurisdiction code is the missing piece – the method above is correct."],"proof":"Grand Rapids’ vendor balance after the invoice and the payment."},{"n":12,"title":"Incoterms for the Motown Bikes customer","goal":"Find the Incoterms and explain them.","app":"Manage Business Partner → Customer role (FLCU01), sales area UE00 / WH / BI.","steps":[{"b":"Open Motown Bikes.","t":"","sub":["Search “Manage Business Partner Master Data” → click the tile.","Click “Business Partner” → 132391 → Go → click the Motown Bikes row."]},{"b":"Switch to the Customer role.","t":"","sub":["Click the “Roles” tab.","Click the “Customer (FLCU01)” row (the chevron “›” on the right) – the view switches to the customer/sales data."]},{"b":"Open the right sales area.","t":"","sub":["Click the “Sales Areas” tab.","Click the row “UE00 / WH / BI” (Bicycles) – the chevron “›”."]},{"b":"Read the Incoterms.","t":" Click “Sales Area Details” → the “Billing” block → read “Incoterms” (live result: FOB, location Dallas)."},{"b":"Explain it.","t":" FOB = the seller covers cost and risk until the goods are loaded at the named place (Dallas); after that the buyer is responsible."}],"proof":"Screenshot of the Incoterms field (FOB, Dallas) + a one-line meaning."},{"n":13,"title":"Change KNEE PADS gross weight to 18 OZ","goal":"Edit one field on the material master.","app":"“Change Material” (MM02).","steps":[{"b":"Open the material.","t":"","sub":["Search “Change Material” → click the tile.","Click “Material” → type KPAD1391.","Click “Select View(s)” → tick “Basic Data 1” → click the green ✓."]},{"b":"Change the weight.","t":"","sub":["Scroll to the “Dimensions/EANs” block.","Click “Gross Weight” → clear it → type 18. Check “Unit of Weight” = OZ."]},{"b":"Save.","t":" Click “Save” → if a “save your data first?” popup appears, click “Yes” → “Material KPAD1391 changed”."}],"proof":"Basic Data 1 showing Gross Weight = 18 OZ."},{"n":14,"title":"Full sales order for PRTR391 → delivery (Miami) → invoice","goal":"Run the whole sell → deliver → bill cycle (no inquiry/quotation needed).","app":"Create Sales Order (classic GUI) → Create Outbound Delivery → Create Billing Document (VF01).","steps":[{"b":"Create the sales order.","t":"","sub":["Open “Create Sales Order” (classic GUI tile). Entry: Order Type OR, UE00 / WH / BI → Continue.","Click “Sold-To Party” → 127391; “Cust. Reference” → training-391; “Cust. Ref. Date” → today.","Item: click “Material” → PRTR3391; “Order Quantity” → 2 → Enter.","If an availability screen appears, click “Delivery proposal” to confirm the line.","Click “Req. Deliv. Date” → today+7. Click “Save” → note the order number."]},{"b":"Create the outbound delivery.","t":"","sub":["Open “Create Outbound Deliveries – From Sales Orders”.","Click “Shipping Point” → MI00; “Sales Document” → your order; set the date filter to “Due Up Until Next Week”; click “Go”.","Tick the row → click “Create Deliveries” → “Display Log” to read the delivery number."]},{"b m Production Order” (CO15) → enter the order number → confirm the yield quantity → Save (this posts the goods receipt of finished bikes)."},{"b":"Screenshot AFTER.","t":" Open MD04 / MMBE again – stock is up, the planned order is gone."}],"proof":"Before & after screenshots (stock increased, planned order consumed)."},{"n":17,"title":"Routing of DXTR391 in the Dallas factory – operation 010","goal":"Show which components are consumed in operation 010.","app":"“Display Routing” (CA03).","steps":[{"b":"Open the routing.","t":"","sub":["Search “Display Routing” → click the tile.","Click “Material” → DXTR3391; “Plant” → DL00 → press Enter."]},{"b":"Open operation 010.","t":" Click “Operation Overview” → click the row for operation 0010 to select it."},{"b":"See its components.","t":" Click “Component Allocation” (or the “Components” button) → the parts used in operation 010 are listed."}],"proof":"Screenshot of operation 010 with its components."},{"n":18,"title":"Status of Purchase Order 4500000321","goal":"Read header + item details from an existing PO.","app":"“Purchase Order” / “Display Purchase Order” (Fiori) or ME23N.","steps":[{"b":"Open the PO.","t":"","sub":["Search “Display Purchase Order” → click the tile.","If it opens a different PO, click the “Other Purchase Order” button → type 4500000321 → Enter."]},{"b":"Read the supplier.","t":" Read the “Supplier” from the header (top of the screen)."},{"b":"Open the item.","t":" Go to the “Items” section and click the item row (or the “ > ” arrow at the far right of the item line) to open the item details."},{"b":"Check the Process Flow.","t":" In the item details, open “Process Flow” (in classic ME23N this tab is called “Purchase Order History”) → it lists the goods-receipt (GR / WE / mvt 101) material document."},{"b":"Read the delivery date.","t":" The goods-receipt POSTING DATE is the date it was delivered to us. If the GR qty is less than the ordered qty, only part was delivered; no invoice line = not yet invoiced."}],"proof":"Supplier (header) + goods-receipt posting date & material doc (Process Flow / PO History)."},{"n":19,"title":"History of Sales Order 338 – when was the invoice paid?","goal":"Trace the order to its accounting/payment document.","app":"“Display Sales Order” (VA03) → Document Flow.","steps":[{"b":"Open the order.","t":" Search “Display Sales Order” → tile → click “Order” → type 338 → Enter."},{"b":"Open the document flow.","t":" Click the “Document Flow” button (top toolbar)."},{"b":"Follow the chain to the payment.","t":"","sub":["The flow shows Order → Delivery → Invoice → Accounting document.","Double-click the Accounting document → if it’s cleared, it shows the clearing (payment) date."]}],"proof":"The document flow + the clearing/payment date."},{"n":20,"title":"Request for Quotation (RFQ) for T-SHIRT391 to two vendors","goal":"Ask two vendors for a price and compare.","app":"“Create RFQ” (ME41) → “Maintain Quotation” (ME47) → “Price Comparison” (ME49).","steps":[{"b":"Create the RFQ (ME41).","t":"","sub":["Search “Create RFQ” → tile. “RFQ Type” → AN; “RFQ Date” → today; “Deadline f. Submissn” → today+7; “Collective No.” → TRAIN391; “Purch. Organization” → US00; “Purchasing Group” → N00 → Enter.","Header: “Delivery Date” → today+14; “Storage Location” → TG00.","Item: click “Material” → SHRT1391; “Quantity” → 100 → Enter."]},{"b":"Save for each of the two vendors.","t":"","sub":["Enter vendor “Dallas Bike Basics” → Save (RFQ #1).","Repeat the RFQ with the same Collective No. TRAIN391 for “Spy Gear” → Save (RFQ #2). Note both numbers."]},{"b":"Enter the prices (ME47).","t":" Open “Maintain Quotation” → for each RFQ click the item price → Dallas Bike Basics = 20, Spy Gear = 40 → Save."},{"b":"Compare (ME49).","t":" Open “Price Comparison” → click “Collective RFQ” → type TRAIN391 → Execute → the cheapest is marked (Dallas at 20)."}],"proof":"The price-comparison screen showing Dallas Bike Basics (20) as best."},{"n":21,"title":"Quotation for Philly Bikes – Deluxe Touring Bike Black","goal":"Same idea as Task 1, different material and discount.","app":"“Manage Sales Quotations” → Create (VA21).","steps":[{"b":"Open Create Quotation + entry box.","t":"","sub":["Search “Create Quotation” → tile.","“Quotation Type” → QT; Sales Org UE00; Channel WH; Division BI → Continue."]},{"b":"Customer + references.","t":"","sub":["Click “Sold-To Party” → F4 → Search term 391 → pick Philly Bikes 127391.","Click “Cust. Reference” → TRAIN10-391; “Cust. Ref. Date” → today."]},{"b":"Add the item.","t":"","sub":["Click first “Material” cell → F4 → search “Deluxe Touring Bike (Black)*” → pick DXTR1391.","“Order Quantity” → 1; “Req. Deliv. Date” → today+7 → Enter."]},{"b":"Discount 3%.","t":" Double-click the item → “Conditions” tab → CnTy RA00, Amount 3 → Enter → Back."},{"b":"Probability 50% + save.","t":" Double-click the item → “Sales A” tab → “Order Probability” → 50 → Back → click “Save”."}],"proof":"The quotation with RA00 3% + Order Probability 50."},{"n":22,"title":"Purchase Order for AIRPUMP from Dallas Bike Basics + receive + invoice","goal":"Buy 50 air pumps, receive, post invoice, check vendor account.","app":"Create PO (ME21N) → Goods Receipt (MIGO) → Create Supplier Invoice (MIRO) → Supplier Balances (FK10N).","steps":[{"b":"Create the PO.","t":"","sub":["Open Create Purchase Order. Header: click “Supplier” → F4 search term 391 → Dallas Bike Basics; “Purch. Org” → US00; “Purchasing Group” → N00.","Item: click “Material” → F4 “Air Pump*” → AIRP1391; “Order Quantity” → 50; “Net Price” → 10; “Plant” → MI00; “Storage Location” → TG00; “Delivery Date” → today+3 weeks.","Click “Save” → note the PO number."]},{"b":"Goods receipt (MIGO).","t":" Open “Post Goods Receipt” → enter the PO → Post. Then open MMBE to show the new inventory."},{"b":"Supplier invoice (MIRO).","t":" Open “Create Supplier Invoice” → reference the PO → check 50 × 10 = 500 USD → Post."},{"b":"Vendor account (FK10N).","t":" Open “Display Supplier Balances” for Dallas Bike Basics → show the credit/debit values."}],"proof":"Inventory after receipt (MMBE) + the vendor account credit/debit."},{"n":23,"title":"General Ledger balance for the Bank Account + its number","goal":"Find the bank G/L account, number and balance.","app":"“Display G/L Account Balances” (FAGLB03).","steps":[{"b":"Find the bank account.","t":"","sub":["Open “Display G/L Account Balances”.","Click the “G/L Account” field → F4 → search the chart of accounts for “Bank” (the main bank account is usually 100000)."]},{"b":"Read the balance.","t":" Enter that account, “Company Code” → US00, “Fiscal Year” → the year → click “Go” → read the number and balance."}],"proof":"The bank account number + its balance."},{"n":24,"title":"Product Group for the Deluxe Touring Bikes","goal":"List the members + their production %.","app":"“Display Product Group” (MC84).","steps":[{"b":"Open the product group.","t":"","sub":["Search “Display Product Group” → click the tile.","Click “Product Group” → F4 → pick “Deluxe Touring Bikes”; click “Plant” → DL00 → click “Display”."]},{"b":"Read the members.","t":" Read the member materials (DXTR1391 / 2391 / 3391) and the “Proportion” / production % column."}],"notes":["The members’ percentages add up to 100% – that’s your check."],"proof":"The member list with each product’s production %."}],"taskData":{"1":["Type QT","UE00 / WH / BI","Sold-to Philly Bikes 127391","PO No. PB-391, date today","Material PRTR3391","Qty 2 EA","Delivery today+14","Discount RA00 10%","Probability 50%"],"2":["Manage Business Partner Master Data","BP Philly Bikes 127391","Contact: First Maryl, Last Streep"],"3":["Manage Business Partner Master Data","BP Spy Gear 107391","Contact: First Nicolas, Last Cage"],"4":["Display Supplier Balances (FK10N)","Supplier e.g. Spy Gear 107391","Company Code US00","Fiscal Year = current"],"5":["Create Material (MM01) + Maintain BOM (CS01)","Trolley TROLLEY391 (FERT)","Parts PTRM391, WHA391 (HALB)","Plant DL00","BOM Usage 1","Base 1 EA (3 wheels)"],"6":["Stock – Single Material (MMBE) + MD04","Material EPAD1391 (Elbow Pads)","Plant where stocked (San Diego SD00)"],"7":["Supplier Spy Gear 107391","Purch Org US00 · Group N00 · Company US00","Material RHMT1391","Qty 100 · Price 27 USD","Delivery today+10","Plant SD00 · SLoc TG00","Warehouse 100 · empty bin STBN-3-391"],"8":["Customer Philly Bikes 127391","Material KPAD1391","Qty 10","Delivery today+10","UE00 / WH / BI","Pick from FG00"],"9":["G/L master + Display G/L Balances","Account 720300","Company Code US00","Fiscal Year = current"],"10":["Display Customer Balances (FD10N) + Supplier Balances (FK10N)","Customer 127391 · Supplier 107391","Company Code US00","Fiscal Year (try 2025)"],"11":["FB60 (no PO) + Post Outgoing Payment (F-53)","Vendor Grand Rapids = 108391","Amount 500 USD · Ref SUPPLY391","Company US00 · dates today","Expense 6850000 · Cost Center NAAD1000"],"12":["Manage Business Partner → Customer role (FLCU01)","Customer Motown Bikes 132391","Sales area UE00 / WH / BI","Read Incoterms on the Billing tab"],"13":["Change Material (MM02)","Material KPAD1391 → Basic Data 1","Gross Weight 18 OZ"],"14":["Customer Philly Bikes 127391","PO Ref training-391","Material PRTR3391","Qty 2 · Delivery today+7","UE00 / WH / BI","Shipping Point Miami (MI00) · SLoc FG00"],"15":["Stock – Single Material (MMBE) + MD04","Material DXTR3391","Stock plant MI00 (Miami)","Production plant DL00 (Dallas)"],"16":["MD04 → convert planned order → Confirm Production Order (CO15)","Material DXTR3391","Plant DL00"],"17":["Display Routing (CA03)","Material DXTR3391 (Dallas)","Plant DL00","Operation 0010"],"18":["Display Purchase Order (ME23N)","PO 4500000321"],"19":["Display Sales Order (VA03) → Document Flow","Sales Order 338"],"20":["ME41 + ME47 + ME49","Material SHRT1391 · Qty 100","Deadline today+7 · Delivery today+14","SLoc TG00 · Collective No. TRAIN391","Vendors Dallas Bike Basics + Spy Gear","Prices 20 / 40 USD"],"21":["Create Quotation (VA21) · QT","Customer Philly Bikes 127391","PO No. TRAIN10-391","Material DXTR1391 · Qty 1","Delivery today+7","Discount RA00 3% · Probability 50%"],"22":["ME21N + MIGO + MIRO + FK10N","Supplier Dallas Bike Basics","Material AIRP1391 · Qty 50 · Price 10 USD","Delivery today+3 weeks","Plant MI00 · SLoc TG00","Invoice 500 USD"],"23":["Display G/L Account Balances (FAGLB03)","Bank account (search “Bank”)","Company Code US00","Fiscal Year = current"],"24":["Display Product Group (MC84)","Deluxe Touring Bikes","Plant DL00","Members DXTR1391 / 2391 / 3391 + %"]},"readFirst":[["Your number is 391.","Replace every ### with 391 (PO numbers like PB-391, materials, last 3 digits of master data)."],["Find a customer / vendor / material.","Click the field's search icon (F4), search by Name, then set Search term = 391 to get YOUR copy. Known: Philly Bikes 127391, Spy Gear 107391."],["Material numbers carry an extra digit.","Trading goods have a “1” before your number: Knee Pads KPAD1391, Elbow Pads EPAD1391, T-Shirt SHRT1391. Bikes have a colour digit: Prof. Touring Red = PRTR3391. When unsure, F4 and search the description."],["Typing dates.","If a date snaps back to today, click it, Cmd+A, Delete, type MM/DD/YYYY, Enter. “In X days” = today + X."],["F4 = search, F1 = explain.","Stuck on a value → F4. Don't know what a field means → F1."],["Save the document number.","SAP shows it at the bottom after you Save. Tasks chain: order → delivery → invoice."],["Use the classic GUI for sales orders.","Your account isn't authorised for the newer “Manage Sales Orders” Fiori app – it errors. Use the classic Create Sales Order screen."]],"meanings":[["Customer / Sold-to Party","the company buying from Global Bike (e.g. Philly Bikes)."],["Supplier / Vendor","the company selling to Global Bike (e.g. Spy Gear, Dallas Bike Basics)."],["Material","the product number in SAP (e.g. KPAD1391 Knee Pads, DXTR3391 a bike)."],["Plant","a business location (DL00 Dallas, SD00 San Diego, MI00 Miami)."],["Storage location","a sub-area inside a plant (TG00 Trading Goods, FG00 Finished Goods)."],["Quotation / Offer","a price offer to a customer – the give-away is the probability field."],["Sales Order","a confirmed customer order that goes on to delivery and invoice."],["Delivery","the shipping document – picking and goods issue happen on it."],["Goods Receipt (GR)","posting that goods arrived; stock goes UP."],["Goods Issue (PGI)","posting that goods left stock (shipped to a customer or production); stock goes DOWN."],["Billing / Invoice","the document that charges the customer."],["BOM","Bill of Material – the list of parts needed to make one finished product."],["RFQ","Request for Quotation – ask suppliers for prices before you buy."],["Transfer Order (TO)","the warehouse instruction that actually moves stock into / out of a bin."],["G/L Account","a General Ledger (accounting) account used for balances and postings."],["Incoterms","international delivery terms – who pays freight and when the risk passes (e.g. FOB)."]],"cheat":[["Sales Org – US East","UE00 (sells from Miami) · Channel WH (Wholesale) · Division BI (Bikes)"],["Sales Org – US West","UW00 (sells from San Diego) · Channel WH · Division BI"],["Purchasing Org / Group / Company","US00 / N00 / US00"],["Plants","MI00 Miami · DL00 Dallas · SD00 San Diego"],["Storage locations","FG00 Finished Goods · TG00 Trading Goods · RM00 Raw · SF00 Semi-finished"],["Warehouse (WM)","Warehouse Number 100 = San Diego · Storage type 001 = Shelf Storage"],["Storage bins (WM)","STBN-1-391, STBN-2-391, STBN-3-391 … (report search: STBN*391)"],["Document types","QT = Quotation · OR = Standard Order · AN = RFQ · NB = Standard PO"],["Key master data","Philly Bikes 127391 · Spy Gear 107391 · Motown Bikes 132391"],["Materials seen live","KPAD1391 Knee Pads · EPAD1391 Elbow Pads · SHRT1391 T-Shirt · PRTR3391 Prof. Touring Red"]],"glossary":[["VA01","Create Sales Order"],["VA21","Create Quotation"],["VA03","Display Sales Order (document flow)"],["VL01N","Create Outbound Delivery"],["VF01","Create Billing Document (invoice)"],["ME21N / ME23N","Create / Display Purchase Order"],["ME41 / ME47 / ME49","Create RFQ / enter vendor prices / compare prices"],["MM01 / MM02","Create / Change Material"],["CS01 / CS03","Create / Display Bill of Material"],["CA03","Display Routing"],["CO15","Confirm Production Order"],["MC84","Display Product Group"],["MMBE","Stock – Single Material (stock by type, per plant)"],["MD04","Monitor Stock / Requirements List (future orders)"],["FK10N / FD10N","Display Supplier / Customer Balances"],["FB60","Create Incoming Invoice (no PO)"],["F-53","Post Outgoing Payment"],["MIGO / MIRO","Post Goods Receipt / Create Supplier Invoice (with PO)"],["FAGLB03","Display G/L Account Balances"],["BP","Maintain Business Partner"]],"wm":["San Diego (plant SD00) is the warehouse-managed site – warehouse number 100. Stock lives in bins named STBN-x-391.","Putaway (goods IN): goods receipt lands in a temp bin → create a transfer order to a real bin → confirm it.","Picking (goods OUT): outbound delivery → create a transfer order to pick from the bin → confirm it → post goods issue.","Every bin move needs a Transfer Order that you then Confirm. The apps are in the Warehouse Management space."]};
var KEY='sapguide391_v1';
var done=new Set();
try{var s=localStorage.getItem(KEY); if(s) done=new Set(JSON.parse(s));}catch(e){}
function save(){try{localStorage.setItem(KEY,JSON.stringify(Array.from(done)));}catch(e){}}
// ----- your-number substitution: replace 391 everywhere with the chosen number -----
var NUMKEY='sapguide391_num';
var NUM; try{NUM=localStorage.getItem(NUMKEY);}catch(e){}
if(!/^[0-9]{1,3}$/.test(NUM||'')) NUM='391';
function S(x){return (''+x).split('391').join(NUM);}
function el(tag,cls,txt){var e=document.createElement(tag); if(cls)e.className=cls; if(txt!=null)e.textContent=S(txt); return e;}

// build a checkbox step row
function stepRow(id,boldTxt,detailTxt){
  var lab=el('label','step'); lab.dataset.id=id;
  var cb=el('input'); cb.type='checkbox'; cb.checked=done.has(id);
  if(cb.checked) lab.classList.add('checked');
  var span=el('span','txt');
  if(boldTxt){var b=el('b',null,boldTxt); span.appendChild(b);}
  if(detailTxt) span.appendChild(document.createTextNode(S(detailTxt)));
  cb.addEventListener('change',function(){
    if(cb.checked){done.add(id); lab.classList.add('checked');} else {done.delete(id); lab.classList.remove('checked');}
    save(); refreshTask(id.split('-')[0]); refreshOverall();
  });
  lab.appendChild(cb); lab.appendChild(span); return lab;
}
function idsForTask(t){var ids=[]; t.steps.forEach(function(s,i){ids.push('t'+t.n+'-s'+i);}); return ids;}
function refreshTask(prefix){
  var t=DATA.tasks.find(function(x){return 't'+x.n===prefix;}); if(!t)return;
  var ids=idsForTask(t); var n=ids.filter(function(id){return done.has(id);}).length;
  var card=document.getElementById('task-'+t.n);
  var badge=card.querySelector('.badge'); badge.textContent=n+'/'+ids.length;
  if(n===ids.length && ids.length>0) card.classList.add('done'); else card.classList.remove('done');
}
function refreshOverall(){
  var totalSteps=0,doneSteps=0,doneTasks=0;
  DATA.tasks.forEach(function(t){var ids=idsForTask(t); totalSteps+=ids.length; var d=ids.filter(function(id){return done.has(id);}).length; doneSteps+=d; if(d===ids.length&&ids.length>0)doneTasks++;});
  var o=document.getElementById('overall');
  var pct=totalSteps?Math.round(doneSteps/totalSteps*100):0;
  o.innerHTML='<b>'+doneTasks+'</b> of 24 tasks complete · '+doneSteps+'/'+totalSteps+' steps ticked'+
    '<div class="obar"><i style="width:'+pct+'%"></i></div>';
}

// ----- reference (collapsible) -----
function buildRef(){
  var wrap=document.getElementById('ref');
  function card(title,fill){
    var d=el('details','card ref'); var sm=el('summary');
    sm.appendChild(el('span','ttitle',title));
    var ch=el('span','chev','▸'); sm.appendChild(ch);
    d.appendChild(sm); var body=el('div','refbody'); fill(body); d.appendChild(body); wrap.appendChild(d);
  }
  card('How to use this guide',function(b){var ul=el('ul'); DATA.readFirst.forEach(function(r){var li=el('li'); li.appendChild(el('b',null,r[0]+' ')); li.appendChild(document.createTextNode(S(r[1]))); ul.appendChild(li);}); b.appendChild(ul);});
  card('SAP words in plain English',function(b){var ul=el('ul'); DATA.meanings.forEach(function(r){var li=el('li'); li.appendChild(el('b',null,r[0]+' — ')); li.appendChild(document.createTextNode(S(r[1]))); ul.appendChild(li);}); b.appendChild(ul);});
  card('Org data cheat sheet',function(b){var t=el('table','ref'); DATA.cheat.forEach(function(r){var tr=el('tr'); tr.appendChild(el('td',null,r[0])); tr.appendChild(el('td',null,r[1])); t.appendChild(tr);}); b.appendChild(t);});
  card('Glossary – app codes',function(b){var t=el('table','ref'); DATA.glossary.forEach(function(r){var tr=el('tr'); tr.appendChild(el('td',null,r[0])); tr.appendChild(el('td',null,r[1])); t.appendChild(tr);}); b.appendChild(t);});
  card('Warehouse Management essentials',function(b){var ul=el('ul'); DATA.wm.forEach(function(x){ul.appendChild(el('li',null,x));}); b.appendChild(ul);});
}

// ----- tasks -----
function buildTasks(){
  var wrap=document.getElementById('tasks');
  DATA.tasks.forEach(function(t){
    var ids=idsForTask(t); var d0=ids.filter(function(id){return done.has(id);}).length;
    var card=el('details','card task'); card.id='task-'+t.n;
    if(d0===ids.length&&ids.length>0) card.classList.add('done');
    var sm=el('summary');
    sm.appendChild(el('span','tnum','Task '+t.n));
    sm.appendChild(el('span','ttitle',t.title));
    sm.appendChild(el('span','badge',d0+'/'+ids.length));
    sm.appendChild(el('span','chev','▸'));
    card.appendChild(sm);
    var body=el('div','body');
    body.appendChild(el('div','goal',t.goal));
    var open=el('div','open'); open.appendChild(el('b',null,'Open: ')); open.appendChild(document.createTextNode(S(t.app))); body.appendChild(open);
    var kd=DATA.taskData[t.n];
    if(kd){var e=el('div','enter'); e.appendChild(el('b',null,'WHAT TO ENTER  ')); e.appendChild(el('span','v',kd.join('    ·    '))); body.appendChild(e);}
    if(t.intro){var ni=el('div','note tip'); ni.appendChild(el('b',null,'HEADS-UP  ')); ni.appendChild(document.createTextNode(S(t.intro))); body.appendChild(ni);}
    body.appendChild(el('div','steplabel','STEPS – tick each one'));
    var ul=el('ul','steps');
    t.steps.forEach(function(s,i){
      var li=el('li');
      li.appendChild(stepRow('t'+t.n+'-s'+i, s.b||'', s.t||''));
      if(s.sub){var su=el('ul','subs'); s.sub.forEach(function(x){var sli=el('li','subdetail'); sli.appendChild(document.createTextNode(S(x))); su.appendChild(sli);}); li.appendChild(su);}
      ul.appendChild(li);
    });
    body.appendChild(ul);
    if(t.notes) t.notes.forEach(function(nt){var nn=el('div','note tip'); nn.appendChild(el('b',null,'TIP  ')); nn.appendChild(document.createTextNode(S(nt))); body.appendChild(nn);});
    var pf=el('div','note proof'); pf.appendChild(el('b',null,'✓ PROOF TO SHOW  ')); pf.appendChild(document.createTextNode(S(t.proof))); body.appendChild(pf);
    card.appendChild(body);
    wrap.appendChild(card);
  });
}
buildRef(); buildTasks(); refreshOverall();

// your-number box
function rerender(){document.getElementById('subnum').textContent=NUM; var r=document.getElementById('ref'); r.innerHTML=''; buildRef(); var tk=document.getElementById('tasks'); tk.innerHTML=''; buildTasks(); refreshOverall();}
document.getElementById('subnum').textContent=NUM;
var ni=document.getElementById('num'); ni.value=NUM;
ni.addEventListener('input',function(){var v=ni.value.replace(/[^0-9]/g,'').slice(0,3); ni.value=v; if(v.length===3){NUM=v; try{localStorage.setItem(NUMKEY,NUM);}catch(e){} rerender();}});
ni.addEventListener('blur',function(){if(ni.value.length<3) ni.value=NUM;});

// controls
document.getElementById('expand').onclick=function(){document.querySelectorAll('details.task').forEach(function(d){d.open=true;});};
document.getElementById('collapse').onclick=function(){document.querySelectorAll('details.card').forEach(function(d){d.open=false;});};
document.getElementById('reset').onclick=function(){if(confirm('Clear all ticked steps?')){done=new Set(); save(); document.querySelectorAll('label.step input').forEach(function(c){c.checked=false; c.parentElement.classList.remove('checked');}); DATA.tasks.forEach(function(t){refreshTask('t'+t.n);}); refreshOverall();}};
document.getElementById('q').addEventListener('input',function(e){
  var q=e.target.value.trim().toLowerCase();
  document.querySelectorAll('details.task').forEach(function(d){
    var t=DATA.tasks.find(function(x){return 'task-'+x.n===d.id;});
    var hay=S(t.title+' '+t.goal+' '+t.app+' '+(DATA.taskData[t.n]||[]).join(' ')).toLowerCase();
    d.classList.toggle('hide', q && hay.indexOf(q)<0);
  });
});
</script>
